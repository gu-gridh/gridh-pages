<nav role="navigation">
  <ul>
    {% for item in navigation_items %}
      <li>
        <a href="{{ item.get_url }}"
           {% if item.open_in_new_tab %}target="_blank" rel="noopener"{% endif %}>
          {{ item.label }}{% if item.open_in_new_tab %} ↗{% endif %}
        </a>
      </li>
    {% endfor %}
  </ul>
</nav>
